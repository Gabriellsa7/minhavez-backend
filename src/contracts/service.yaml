        id:
          type: string
          description: The unique identifier of the queue item
        queueId:
          type: string
          description: The queue identifier associated with the queue item
        patientId:
          type: string
          description: The patient identifier associated with the queue item
        position:
          type: integer
          description: The position of the queue item in the queue
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH]
          description: The priority level of the patient (1-5)
        status:
          type: string
          enum: [WAITING, IN_SERVICE, FINISHED]
          description: The status of the queue item
        checkInTime:
          type: string
          format: date-time
          description: The date and time the patient checked in for the queue item
        calledAt:
          type: string
          format: date-time
          description: The date and time the patient was called for the queue item
          nullable: true
        finishedAt:
          type: string
          format: date-time
          description: The date and time the queue item was finished
          nullable: true
        createdAt:
          type: string
          format: date-time
