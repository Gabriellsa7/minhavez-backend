components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the user
        name:
          type: string
          description: The user's name
        email:
          type: string
          description: The user's email address
        active:
          type: boolean
          description: Whether the user is active
        role:
          type: string
          enum:
            - USER
            - ADMIN
          description: User or Admin
        createdAt:
          type: string
          format: date-time
          description: The date and time the user was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time the user was last updated
    CreateUser:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          description: The user's name
        email:
          type: string
          description: The user's email address
        password:
          type: string
          description: The user's password
        role:
          type: string
          enum:
            - USER
            - ADMIN
          description: The user's role (e.g., admin, user)
    UpdateUser:
      type: object
      properties:
        name:
          type: string
          description: The user's name
        email:
          type: string
          description: The user's email address
        password:
          type: string
          description: The user's password
    Error:
      type: object
      required:
        - message
        - status
      properties:
        message:
          type: string
          description: Error message describing what went wrong
          example: 'User not found'
        status:
          type: integer
          description: HTTP status code
          example: 404
        timestamp:
          type: string
          format: date-time
          description: When the error occurred
          example: '2025-07-15T17:30:00.000Z'
        path:
          type: string
          description: The API endpoint that generated the error
          example: '/users/123'
    ValidationError:
      type: object
      required:
        - message
        - status
        - errors
      properties:
        message:
          type: string
          description: General validation error message
          example: 'Validation failed'
        status:
          type: integer
          description: HTTP status code
          example: 400
        timestamp:
          type: string
          format: date-time
          description: When the error occurred
          example: '2025-07-15T17:30:00.000Z'
        path:
          type: string
          description: The API endpoint that generated the error
          example: '/users'
        errors:
          type: array
          description: List of specific validation errors
          items:
            type: object
            properties:
              field:
                type: string
                description: The field that failed validation
                example: 'email'
              message:
                type: string
                description: The validation error message
                example: 'Email is required'
              value:
                type: string
                description: The invalid value provided
                example: ''
    SuccessMessage:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Success message
          example: 'User deleted successfully'
        timestamp:
          type: string
          format: date-time
          description: When the operation was completed
          example: '2025-07-15T17:30:00.000Z'

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          description: User email
        password:
          type: string
          description: User password

    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          description: Refresh token to obtain new access token

    AuthToken:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT access token for authenticated requests
        refreshToken:
          type: string
          description: JWT refresh token to obtain new access tokens
        expiresIn:
          type: string
          description: Expiration time of the access token (e.g., "1h")

    HealthUnit:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the health unit
        name:
          type: string
          description: The name of the health unit
        address:
          $ref: '#/components/schemas/HealthUnitAddress'
          description: The address of the health unit
        phone:
          type: string
          description: The contact phone number of the health unit
        email:
          type: string
          description: The contact email address of the health unit
        createdAt:
          type: string
          format: date-time
          description: The date and time the health unit was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time the health unit was last updated
    HealthUnitAddress:
      type: object
      required:
        - street
        - number
        - neighborhood
        - city
        - state
        - zipCode
      properties:
        street:
          type: string
        number:
          type: string
        complement:
          type: string
          nullable: true
        neighborhood:
          type: string
        city:
          type: string
        state:
          type: string
        zipCode:
          type: string
    CreateHealthUnit:
      type: object
      required:
        - name
        - address
        - phone
        - email
      properties:
        name:
          type: string
          description: The name of the health unit
        address:
          $ref: '#/components/schemas/HealthUnitAddress'
          description: The address of the health unit
        phone:
          type: string
          description: The contact phone number of the health unit
        email:
          type: string
          description: The contact email address of the health unit
    UpdateHealthUnit:
      type: object
      properties:
        name:
          type: string
          description: The name of the health unit
        address:
          $ref: '#/components/schemas/HealthUnitAddress'
          description: The address of the health unit
        phone:
          type: string
          description: The contact phone number of the health unit
        email:
          type: string
          description: The contact email address of the health unit
    Patient:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the patient
        userId:
          type: string
          description: The user identifier of the patient
        cpf:
          type: string
          description: The CPF (Brazilian individual taxpayer registry) of the patient
        birthDate:
          type: string
          format: date
          description: The birth date of the patient
        phone:
          type: string
          description: The contact phone number of the patient
        priority:
          type: string
          enum:
            - NORMAL
            - ELDERLY
            - PREGNANT
            - DISABLED
          description: The priority level of the patient (1-5)
        createdAt:
          type: string
          format: date-time
          description: The date and time the patient was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time the patient was last updated
    CreatePatient:
      type: object
      required:
        - userId
        - cpf
        - birthDate
        - phone
        - priority
      properties:
        userId:
          type: string
          description: The user identifier of the patient
        cpf:
          type: string
          description: The CPF (Brazilian individual taxpayer registry) of the patient
        birthDate:
          type: string
          format: date
          description: The birth date of the patient
        phone:
          type: string
          description: The contact phone number of the patient
        priority:
          type: string
          enum:
            - NORMAL
            - ELDERLY
            - PREGNANT
            - DISABLED
          description: |
            Priority classification of the patient.

            NORMAL - Standard priority
            ELDERLY - Elderly patient
            PREGNANT - Pregnant patient
            DISABLED - Patient with disability
            EMERGENCY - Emergency case
    UpdatePatient:
      type: object
      properties:
        userId:
          type: string
          description: The user identifier of the patient
        cpf:
          type: string
          description: The CPF (Brazilian individual taxpayer registry) of the patient
        birthDate:
          type: string
          format: date
          description: The birth date of the patient
        phone:
          type: string
          description: The contact phone number of the patient
        priority:
          type: string
          enum:
            - NORMAL
            - ELDERLY
            - PREGNANT
            - DISABLED
          description: The priority level of the patient (1-5)
    HealthProfessional:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the health professional
        userId:
          type: string
          description: The user identifier of the health professional
        healthUnitId:
          type: string
          description: The health unit identifier of the health professional
        specialty:
          type: string
          description: The specialty of the health professional
        professionalLicense:
          type: string
          description: The professional license number of the health professional
        active:
          type: boolean
          description: Whether the health professional is active
        createdAt:
          type: string
          format: date-time
          description: The date and time the health professional was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time the health professional was last updated
    CreateHealthProfessional:
      type: object
      required:
        - userId
        - healthUnitId
        - specialty
        - professionalLicense
      properties:
        userId:
          type: string
          description: The user identifier of the health professional
        healthUnitId:
          type: string
          description: The health unit identifier of the health professional
        specialty:
          type: string
          description: The specialty of the health professional
        professionalLicense:
          type: string
          description: The professional license number of the health professional
    UpdateHealthProfessional:
      type: object
      properties:
        userId:
          type: string
          description: The user identifier of the health professional
        healthUnitId:
          type: string
          description: The health unit identifier of the health professional
        specialty:
          type: string
          description: The specialty of the health professional
        professionalLicense:
          type: string
          description: The professional license number of the health professional
        active:
          type: boolean
          description: Whether the health professional is active
    Queue:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the queue entry
        professionalId:
          type: string
          description: The professional identifier associated with the queue entry
        healthUnitId:
          type: string
          description: The health unit identifier associated with the queue entry
        status:
          type: string
          enum: [OPEN, IN_PROGRESS, CLOSED]
          description: The status of the queue entry
        type:
          type: string
          enum: [SPONTANEOUS, SCHEDULED]
          description: The type of the queue entry
        openedAt:
          type: string
          format: date-time
          description: The date and time the queue entry was opened
        closedAt:
          type: string
          format: date-time
          nullable: true
          description: The date and time the queue entry was closed (null if still open)
        createdAt:
          type: string
          format: date-time
          description: The date and time the queue entry was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time the queue entry was last updated
    CreateQueue:
      type: object
      required:
        - professionalId
        - healthUnitId
        - type
      properties:
        professionalId:
          type: string
          description: The professional identifier associated with the queue entry
        healthUnitId:
          type: string
          description: The health unit identifier associated with the queue entry
        type:
          type: string
          enum: [SPONTANEOUS, SCHEDULED]
          description: The type of the queue entry
    UpdateQueue:
      type: object
      properties:
        professionalId:
          type: string
          description: The professional identifier associated with the queue entry
        healthUnitId:
          type: string
          description: The health unit identifier associated with the queue entry
        status:
          type: string
          enum: [OPEN, IN_PROGRESS, CLOSED]
          description: The status of the queue entry
